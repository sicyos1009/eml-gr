name: Paper2 Zero Forest External CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'paper2_zero_forests_content_v1_2_external_handoff_final/**'

jobs:
  zero-forest-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        shell: bash
        run: python -m pip install sympy
      - name: Run Paper2 zero-forest CI payload
        shell: bash
        run: |
          cd paper2_zero_forests_content_v1_2_external_handoff_final
          python scripts/run_ci_payload_v1_2.py --package-root .
          python scripts/external_ci_record_builder_v1_2.py --package-root . --mode github_actions --out external_ci/external_ci_results.v1_2.github_actions.json
          python scripts/external_ci_record_validator_v1_2.py --package-root . --record external_ci/external_ci_results.v1_2.github_actions.json --out outputs/external_ci_validation_v1_2_github_actions.json --md-out outputs/external_ci_validation_v1_2_github_actions.md --require-real
      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper2-zero-forest-v1-2-evidence
          path: |
            paper2_zero_forests_content_v1_2_external_handoff_final/external_ci/*.json
            paper2_zero_forests_content_v1_2_external_handoff_final/external_ci/logs/*.log
            paper2_zero_forests_content_v1_2_external_handoff_final/outputs/*.json
            paper2_zero_forests_content_v1_2_external_handoff_final/outputs/*.md
