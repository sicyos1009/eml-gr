name: WP15a Coq formal kernel seed

on:
  workflow_dispatch:
  push:
    paths:
      - 'proof_assistant/coq/**'
      - '.github/workflows/wp15a_coq_compile.yml'

jobs:
  coq-8-18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile WP15a Coq targets and emit record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p external_ci/logs external_ci/records
          LOG="external_ci/logs/wp15a_github_actions_coq_8_18.log"
          RECORD="external_ci/records/wp15a_external_compile_record.github_actions.json"
          TARGET1="proof_assistant/coq/CoqZeroLeafMinimal_v2_3.v"
          TARGET2="proof_assistant/coq/WP15ZeroReplaySeed.v"
          : > "$LOG"

          log() {
            printf '%s\n' "$*" | tee -a "$LOG"
          }

          run_logged() {
            log "command: $*"
            "$@" 2>&1 | tee -a "$LOG"
            rc=${PIPESTATUS[0]}
            log "returncode: $rc"
            log ""
            test "$rc" -eq 0
          }

          TARGET1_SHA="$(sha256sum "$TARGET1" | awk '{print $1}')"
          TARGET2_SHA="$(sha256sum "$TARGET2" | awk '{print $1}')"

          log "WP15a GitHub Actions Coq 8.18 compile log"
          log "repository: ${GITHUB_REPOSITORY}"
          log "ref_name: ${GITHUB_REF_NAME}"
          log "commit_sha: ${GITHUB_SHA}"
          log "run_id: ${GITHUB_RUN_ID}"
          log "run_attempt: ${GITHUB_RUN_ATTEMPT}"
          log "target_1: ${TARGET1}"
          log "target_1_sha256: ${TARGET1_SHA}"
          log "target_2: ${TARGET2}"
          log "target_2_sha256: ${TARGET2_SHA}"
          log ""

          run_logged docker run --rm coqorg/coq:8.18 coqc --version
          run_logged docker run --rm -v "${GITHUB_WORKSPACE}:/work:ro" -w /tmp coqorg/coq:8.18 sh -lc "cp /work/${TARGET1} . && coqc $(basename "$TARGET1")"
          run_logged docker run --rm -v "${GITHUB_WORKSPACE}:/work:ro" -w /tmp coqorg/coq:8.18 sh -lc "cp /work/${TARGET2} . && coqc $(basename "$TARGET2")"

          RAW_LOG_SHA="$(sha256sum "$LOG" | awk '{print $1}')"
          export RECORD TARGET1 TARGET2 TARGET1_SHA TARGET2_SHA RAW_LOG_SHA
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema_id": "wp15a.proof_assistant_compile_record.v1",
              "record_id": f"wp15a-github-actions-{os.environ['GITHUB_RUN_ID']}-attempt-{os.environ['GITHUB_RUN_ATTEMPT']}",
              "provider": "github-actions",
              "trust_level": "hosted_external_ci",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "branch": os.environ["GITHUB_REF_NAME"],
              "commit_sha": os.environ["GITHUB_SHA"],
              "run_id": int(os.environ["GITHUB_RUN_ID"]),
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "run_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "workflow": "WP15a Coq formal kernel seed",
              "job": "coq-8-18",
              "real_external_run": True,
              "compile_jobs": [
                  {
                      "tool": "coqc",
                      "tool_version": "The Coq Proof Assistant, version 8.18.0",
                      "target": os.environ["TARGET1"],
                      "target_sha256": os.environ["TARGET1_SHA"],
                      "compiled_pass": True,
                      "returncode": 0,
                      "raw_log_path": "external_ci/logs/wp15a_github_actions_coq_8_18.log",
                      "raw_log_sha256": os.environ["RAW_LOG_SHA"],
                  },
                  {
                      "tool": "coqc",
                      "tool_version": "The Coq Proof Assistant, version 8.18.0",
                      "target": os.environ["TARGET2"],
                      "target_sha256": os.environ["TARGET2_SHA"],
                      "compiled_pass": True,
                      "returncode": 0,
                      "raw_log_path": "external_ci/logs/wp15a_github_actions_coq_8_18.log",
                      "raw_log_sha256": os.environ["RAW_LOG_SHA"],
                  },
              ],
              "not_claimed": [
                  "Lean compile success",
                  "Rocq compile success",
                  "full tensor CAS verification",
                  "full formal certificate system",
              ],
          }
          Path(os.environ["RECORD"]).write_text(json.dumps(record, indent=2) + "\n", encoding="utf-8")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: wp15a-coq-8-18-record
          path: |
            external_ci/logs/wp15a_github_actions_coq_8_18.log
            external_ci/records/wp15a_external_compile_record.github_actions.json
