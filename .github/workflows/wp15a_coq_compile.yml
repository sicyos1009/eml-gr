name: WP15a Coq formal kernel seed

on:
  workflow_dispatch:
  push:
    paths:
      - 'proof_assistant/coq/**'
      - '.github/workflows/wp15a_coq_compile.yml'

jobs:
  coq-8-18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Coq version
        run: docker run --rm coqorg/coq:8.18 coqc --version
      - name: Compile inherited Paper2 seed theorem
        run: docker run --rm -v "${{ github.workspace }}:/work:ro" -w /tmp coqorg/coq:8.18 sh -lc 'cp /work/proof_assistant/coq/CoqZeroLeafMinimal_v2_3.v . && coqc CoqZeroLeafMinimal_v2_3.v'
      - name: Compile WP15a zero replay seed
        run: docker run --rm -v "${{ github.workspace }}:/work:ro" -w /tmp coqorg/coq:8.18 sh -lc 'cp /work/proof_assistant/coq/WP15ZeroReplaySeed.v . && coqc WP15ZeroReplaySeed.v'
